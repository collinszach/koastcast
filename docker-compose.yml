services:
  # ─── Open-Meteo (self-hosted, free for commercial use) ───────────────────
  open-meteo-api:
    image: ghcr.io/open-meteo/open-meteo:latest
    container_name: koastcast_open_meteo
    restart: unless-stopped
    expose:
      - "8080"  # only accessible within Docker network; no host port binding
    volumes:
      - open_meteo_data:/app/data
    environment:
      - DOMAIN=localhost
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/marine?latitude=37.5&longitude=-122.5&hourly=wave_height"]
      interval: 60s
      timeout: 10s
      retries: 3

  # ─── Koastcast Next.js Frontend ──────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: prod
      args:
        # NEXT_PUBLIC_* vars baked into client bundle at build time
        NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    container_name: koastcast_web
    restart: unless-stopped
    ports:
      - "3002:3001"
    environment:
      # Server-side env vars (not baked in — runtime only)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - NUC_API_BASE_URL=http://api:8000  # internal Docker network
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      - api

  # ─── Koastcast FastAPI Backend ───────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: koastcast_api
    restart: unless-stopped
    ports:
      - "8003:8000"
    volumes:
      - ./apps/api/models:/app/models  # ML models persist
      - ./data:/app/data               # bathymetry, SWAN configs
    # Secrets are injected by Bitwarden Secrets Manager at startup.
    # Launch with: bws run -- docker compose up -d
    # bws injects: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, SUPABASE_ANON_KEY,
    #              NOAA_TIDES_API_KEY, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, SECRET_KEY
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-false}
      # Set CORS_ORIGINS in .env to your deployed frontend URL (no trailing slash).
      # Example: CORS_ORIGINS=https://koastcast.com
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3002}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      # Required for JWT verification — Supabase Dashboard → Project Settings → API → JWT Secret
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - NOAA_TIDES_API_KEY=${NOAA_TIDES_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - OPEN_METEO_BASE_URL=http://open-meteo-api:8080  # internal Docker port (container-to-container)
      - OPEN_METEO_FORECAST_BASE_URL=https://api.open-meteo.com  # wind/atmosphere (marine container doesn't serve this)
      - LLAMA_CPP_BASE_URL=http://llm:11434/v1
    depends_on:
      - open-meteo-api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── LLM Server (Ollama — OpenAI-compatible API) ────────────────────────
  # NOTE: Set LLAMA_CPP_BASE_URL=http://llm:11434/v1 in the api service env.
  # Pull the model after first start: docker exec koastcast_llm ollama pull phi4-mini
  llm:
    image: ollama/ollama:latest
    container_name: koastcast_llm
    restart: unless-stopped
    expose:
      - "11434"  # only accessible within Docker network; no host port binding
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Cloudflare Tunnel ───────────────────────────────────────────────────
  # Exposes the Koastcast NUC API to the internet via api.koastcast.com
  # without opening any inbound firewall ports. The origin is never directly reachable.
  # Set CLOUDFLARE_TUNNEL_TOKEN in .env — get it from Cloudflare Zero Trust → Tunnels.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: koastcast_tunnel
    restart: unless-stopped
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - api
      - web

  # ─── Nginx Reverse Proxy (SSL termination) ───────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: koastcast_nginx
    ports:
      - "8880:80"   # HTTP → HTTPS redirect  (8880 avoids conflict with hive-nginx on :80)
      - "8443:443"  # HTTPS (self-signed cert for LAN; Cloudflare Tunnel handles external TLS)
    volumes:
      # Bind-mount ./nginx/certs/ → /etc/nginx/certs inside the container.
      # generate-certs.sh (docker-entrypoint.d hook) writes cert.pem + key.pem
      # here on first start.  The files persist on the NUC host and survive
      # container restarts and rebuilds.  Copy cert.pem to LAN device trust
      # stores to suppress browser warnings (see RUNBOOK §13).
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - web
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:443/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── SWAN Wave Model Runner ───────────────────────────────────────────────
  # NOTE: Build this image from ./docker/swan/Dockerfile which installs SWAN
  # Only enable after Phase 3
  # swan:
  #   build:
  #     context: ./docker/swan
  #   container_name: koastcast_swan
  #   restart: unless-stopped
  #   volumes:
  #     - ./data/swan_configs:/app/configs
  #     - ./data/bathymetry:/app/bathy
  #     - swan_output:/app/output

volumes:
  open_meteo_data:
  ollama_data:
  # swan_output:

networks:
  default:
    name: koastcast_net
    enable_ipv6: false
