events { worker_connections 1024; }

http {
  # ── Shared SSL settings ──────────────────────────────────────────────────────
  ssl_certificate     /etc/nginx/certs/cert.pem;
  ssl_certificate_key /etc/nginx/certs/key.pem;

  # DH params for DHE cipher suites — pre-generated at image build time
  ssl_dhparam /etc/nginx/dhparam.pem;

  # TLS 1.2 + TLS 1.3 (keep 1.2 for LAN device compatibility — older phones, TVs)
  # To restrict to TLS 1.3 only, change to: ssl_protocols TLSv1.3;
  ssl_protocols TLSv1.2 TLSv1.3;

  # ECDH curves — prefer X25519 (fastest, strongest), then P-256 and P-384
  ssl_ecdh_curve X25519:prime256v1:secp384r1;

  # Strong cipher suite (forward secrecy first, no RC4/3DES/export)
  # TLS 1.3 ciphersuites are not configurable here — nginx/OpenSSL selects them automatically
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
  ssl_prefer_server_ciphers off;  # let TLS 1.3 negotiate freely

  # Session resumption — 4h is reasonable for a LAN-only reverse proxy
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 4h;
  ssl_session_tickets off;  # disable tickets — avoid forward-secrecy risk

  # OCSP stapling — enabled for Let's Encrypt certs (Tailscale).
  # If falling back to self-signed certs, nginx will log a warning about stapling
  # but will still start and serve correctly.
  ssl_stapling on;
  ssl_stapling_verify on;
  resolver 1.1.1.1 8.8.8.8 valid=300s;
  resolver_timeout 5s;

  # ── HTTP → HTTPS redirect (port 80) ─────────────────────────────────────────
  # Catches any LAN request on port 80 and redirects to HTTPS.
  server {
    listen 80;
    server_name _;

    # ACME challenge pass-through (for future Let's Encrypt integration)
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS server ─────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    # Catch-all: accepts localhost, LAN IP, and Tailscale hostname (e.g. nuc.tail12345.ts.net).
    # The cert is issued by Let's Encrypt via `tailscale cert` — browser-trusted on all
    # tailnet devices automatically; no rootCA distribution needed.
    server_name _;

    # ── Security headers ────────────────────────────────────────────────────────

    # HSTS — 1 year, includeSubDomains, preload flag included
    # Note: only submit to HSTS preload list if you have a real public domain.
    # For LAN-only use the header is still valuable to force HTTPS for return visits.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;

    # Prevent Adobe Flash and PDF cross-domain access
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # Isolate browsing context — prevents opener attacks from popups
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Note: Cross-Origin-Embedder-Policy "require-corp" is intentionally omitted.
    # It breaks loading cross-origin resources (map tiles, fonts, Stripe iframes)
    # unless every resource sends CORP/COEP headers — not feasible for third-party
    # content. Enable only if you control all loaded origins.

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' http://localhost:* http://127.0.0.1:* https://*.supabase.co wss://*.supabase.co https://*.stripe.com https://server.arcgisonline.com https://basemaps.cartocdn.com https://tile.opentopomap.org https://a.tile.opentopomap.org https://*.open-meteo.com https://marine-api.open-meteo.com; frame-src https://js.stripe.com; worker-src blob:; object-src 'none';" always;

    # ── API proxy — FastAPI backend (NUC local Docker network) ─────────────────
    location /api/v1/ {
      proxy_pass http://api:8000/api/v1/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
      proxy_connect_timeout 10s;
    }

    # ── Health check — expose API health directly for uptime monitors ───────────
    location /health {
      proxy_pass http://api:8000/health;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      access_log off;
    }

    # ── Next.js web app — supports WebSocket (HMR in dev) ──────────────────────
    location / {
      proxy_pass http://web:3001;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 120s;
      proxy_connect_timeout 10s;
    }
  }
}
